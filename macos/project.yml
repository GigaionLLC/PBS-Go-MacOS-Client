# XcodeGen spec. On a Mac:  brew install xcodegen && cd macos && xcodegen && open PBMac.xcodeproj
# The .xcodeproj is generated (gitignored); this file is the source of truth.
name: PBMac
options:
  bundleIdPrefix: com.gigaion
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_LANGUAGE: en

targets:
  PBMac:
    type: application
    platform: macOS
    sources:
      - path: PBMac
    settings:
      base:
        PRODUCT_NAME: "Proxmox Backup"
        PRODUCT_BUNDLE_IDENTIFIER: com.gigaion.pbmac
        INFOPLIST_FILE: PBMac/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        # Apple Silicon only (matches the pbmac darwin/arm64 target). No hardened
        # runtime / sandbox: the app execs the bundled pbmac and talks to the
        # network without needing special entitlements or notarization.
        ARCHS: arm64
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_ENTITLEMENTS: ""
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
    # Build the pbmac CLI and embed it in the app bundle so it ships as a single
    # download. Runs before code signing, so the app's signature covers it.
    postCompileScripts:
      - name: Embed pbmac CLI
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          export PATH="$PATH:/usr/local/go/bin:/opt/homebrew/bin:$HOME/go/bin"
          if ! command -v go >/dev/null 2>&1; then
            echo "error: Go toolchain not found on PATH; install Go to embed the pbmac CLI." >&2
            exit 1
          fi
          DEST="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH"
          mkdir -p "$DEST"
          VER="${MARKETING_VERSION:-dev}"
          LDFLAGS="-s -w -X github.com/GigaionLLC/PBS-Go-MacOS-Client/internal/cli.Version=$VER"
          ( cd "$SRCROOT/.." && GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 \
              go build -trimpath -ldflags "$LDFLAGS" -o "$DEST/pbmac" ./cmd/pbmac )
          chmod +x "$DEST/pbmac"
          echo "embedded pbmac $VER -> $DEST/pbmac"
