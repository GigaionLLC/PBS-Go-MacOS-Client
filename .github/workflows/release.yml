name: Release

# Cut a macOS arm64 test build. Push a tag (e.g. `git tag v0.1.0 && git push --tags`)
# to create a GitHub Release with the binary attached, or run manually from the
# Actions tab to produce a downloadable artifact without publishing a release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version string to stamp into the binary (e.g. v0.1.0-test)"
        required: false
        default: "dev"

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  release:
    name: build darwin/arm64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: resolve version
        id: v
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: build
        env:
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          GOOS=darwin GOARCH=arm64 go build -trimpath \
            -ldflags "-s -w -X github.com/GigaionLLC/PBS-Go-MacOS-Client/internal/cli.Version=${VERSION}" \
            -o pbmac-darwin-arm64 ./cmd/pbmac
          shasum -a 256 pbmac-darwin-arm64 | tee pbmac-darwin-arm64.sha256

      - name: upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pbmac-darwin-arm64
          path: |
            pbmac-darwin-arm64
            pbmac-darwin-arm64.sha256
          if-no-files-found: error

      - name: publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            pbmac-darwin-arm64 pbmac-darwin-arm64.sha256 \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
