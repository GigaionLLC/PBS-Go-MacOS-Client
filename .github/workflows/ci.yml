name: CI

on:
  push:
    branches: ["**"] # run on every branch push so feature branches get CI too
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos:
    name: build & test (macOS arm64)
    runs-on: macos-14 # Apple Silicon — the real release target
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: build (all packages)
        run: go build ./...

      - name: test (race detector)
        run: go test -race ./...

      - name: build native arm64 binary
        run: go build -trimpath -o pbmac ./cmd/pbmac

      - name: smoke — version
        run: ./pbmac version

      - name: smoke — dry-run backup (offline pipeline)
        run: |
          mkdir -p smoke/sub
          printf 'hello pbmac'   > smoke/a.txt
          printf 'nested bytes'  > smoke/sub/b.txt
          ./pbmac backup --dry-run root.pxar:smoke

      - name: smoke — encrypted dry-run backup (keyed digest path)
        run: ./pbmac backup --dry-run --encrypt root.pxar:smoke

      - name: smoke — GUI arg order (flags after positional parse; stdout is JSON)
        run: ./pbmac backup --dry-run root.pxar:smoke --json | python3 -c "import sys,json; json.load(sys.stdin)"

      - name: upload arm64 binary
        uses: actions/upload-artifact@v4
        with:
          name: pbmac-darwin-arm64
          path: pbmac
          if-no-files-found: error

  cross-compile:
    name: cross-compile check (linux host)
    runs-on: ubuntu-latest # fast build-tag regression check for the darwin target
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: cross-compile darwin/arm64
        run: GOOS=darwin GOARCH=arm64 go build ./...

      - name: vet darwin/arm64 (build-tag regressions)
        run: GOOS=darwin GOARCH=arm64 go vet ./...

  gui-macos:
    name: build SwiftUI app (macOS)
    runs-on: macos-15 # needs Xcode 16 to read XcodeGen's project format (objectVersion 77)
    steps:
      - uses: actions/checkout@v4

      - name: select latest Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: install xcodegen
        run: brew install xcodegen

      - name: generate Xcode project
        working-directory: macos
        run: xcodegen generate

      - name: build app (embeds pbmac)
        working-directory: macos
        run: |
          xcodebuild \
            -project PBMac.xcodeproj \
            -target PBMac \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: verify pbmac is embedded and runs
        working-directory: macos
        run: |
          APP=$(find build/Build/Products -maxdepth 2 -name '*.app' | head -1)
          echo "app bundle: $APP"
          test -x "$APP/Contents/Resources/pbmac" || { echo "pbmac not embedded"; exit 1; }
          "$APP/Contents/Resources/pbmac" version
