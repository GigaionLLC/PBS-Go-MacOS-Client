name: Live PBS validation

# MANUAL ONLY — real backup + restore round-trips against a live PBS.
# GitHub-hosted runners are on the public internet, so the server must be
# reachable over the WAN (port 8007). Configure three repo secrets first
# (Settings -> Secrets and variables -> Actions):
#   PBS_REPOSITORY   <wan-host>:8007:<datastore>   (our client's format)
#   PBS_API_TOKEN    USER@REALM!TOKENID:SECRET
#   PBS_FINGERPRINT  server cert SHA-256 (AA:BB:.. or bare hex)
# The token needs DatastoreAdmin (or Datastore.Read+Backup) on the datastore.
# Test snapshots are pruned at the end (even on failure).
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live:
    name: backup/restore + xattrs (macOS arm64)
    runs-on: macos-14
    env:
      PBS_REPOSITORY: ${{ secrets.PBS_REPOSITORY }}
      PBS_API_TOKEN: ${{ secrets.PBS_API_TOKEN }}
      PBS_FINGERPRINT: ${{ secrets.PBS_FINGERPRINT }}
      BID: ci-${{ github.run_id }}
      IID: ci-inc-${{ github.run_id }}
      XID: ci-xattr-${{ github.run_id }}
      FID: ci-flags-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: check secrets are set
        run: |
          if [ -z "$PBS_REPOSITORY" ] || [ -z "$PBS_API_TOKEN" ] || [ -z "$PBS_FINGERPRINT" ]; then
            echo "::error::Set PBS_REPOSITORY, PBS_API_TOKEN and PBS_FINGERPRINT repo secrets first."
            exit 1
          fi

      - name: build pbmac
        run: go build -trimpath -o pbmac ./cmd/pbmac

      - name: ping + list (auth + TLS pin)
        run: |
          ./pbmac ping
          ./pbmac list

      - name: prepare test tree
        run: |
          mkdir -p data/sub
          printf 'hello from CI run %s\n' "$BID" > data/a.txt
          printf 'nested bytes\n' > data/sub/b.txt
          head -c 40000 /dev/urandom > data/blob.bin

      - name: plain backup -> restore -> verify
        run: |
          ./pbmac backup --id "$BID" test.pxar:data
          BT=$(./pbmac list --json | python3 -c "import sys,json;print([s['backup-time'] for s in json.load(sys.stdin) if s['backup-id']=='$BID'][-1])")
          echo "BT_PLAIN=$BT" >> "$GITHUB_ENV"
          ./pbmac restore --target out "host/$BID/$BT" test.pxar
          diff -r data out
          echo "plain round-trip byte-perfect"

      - name: single-file restore
        run: |
          rm -rf single && mkdir single
          ./pbmac restore --file /a.txt --target single "host/$BID/$BT_PLAIN" test.pxar
          test "$(cat single/a.txt)" = "hello from CI run $BID"
          test "$(find single -type f | wc -l | tr -d ' ')" = "1"
          echo "single-file restore OK"

      - name: encrypted backup -> restore -> verify (+ no-key negative)
        run: |
          openssl rand -hex 32 > enc.key
          ./pbmac backup --id "${BID}-enc" --keyfile enc.key test.pxar:data
          BT=$(./pbmac list --json | python3 -c "import sys,json;print([s['backup-time'] for s in json.load(sys.stdin) if s['backup-id']=='${BID}-enc'][-1])")
          echo "BT_ENC=$BT" >> "$GITHUB_ENV"
          ./pbmac restore --keyfile enc.key --target out-enc "host/${BID}-enc/$BT" test.pxar
          diff -r data out-enc
          if ./pbmac restore --target out-nokey "host/${BID}-enc/$BT" test.pxar 2>/dev/null; then
            echo "::error::no-key restore unexpectedly succeeded"; exit 1
          fi
          echo "encrypted round-trip OK; no-key restore refused"

      - name: incremental dedup (previous-snapshot reuse)
        run: |
          mkdir -p inc/docs
          head -c 20000000 /dev/urandom > inc/big.bin
          printf 'v1\n' > inc/docs/notes.txt
          ./pbmac backup --id "$IID" test.pxar:inc >/dev/null
          sleep 2 # PBS snapshots are second-granularity; ensure a newer timestamp
          ./pbmac backup --id "$IID" --json test.pxar:inc > inc2.json
          cat inc2.json
          python3 - <<'PY'
          import json
          r = json.load(open('inc2.json'))
          assert r['unique_chunks'] == 0, f"expected 0 uploads on unchanged re-backup, got {r['unique_chunks']}"
          assert r['reused_chunks'] > 0, "expected chunk reuse from the previous snapshot"
          print(f"incremental reuse OK: uploaded 0, reused {r['reused_chunks']} chunks")
          PY
          BT=$(./pbmac list --json | python3 -c "import sys,json;print(max(s['backup-time'] for s in json.load(sys.stdin) if s['backup-id']=='$IID'))")
          ./pbmac restore --target inc-out "host/$IID/$BT" test.pxar
          diff -r inc inc-out
          echo "incremental snapshot restores byte-perfect"

      - name: macOS xattr fidelity (real listxattr/getxattr/setxattr)
        run: |
          mkdir -p xa
          printf 'xattr payload\n' > xa/f.txt
          xattr -w com.pbmac.test1 "hello-value-123" xa/f.txt          # string attr
          xattr -wx com.pbmac.bin "de ad be ef 00 11" xa/f.txt         # binary attr (incl. a NUL)
          echo "--- source xattrs ---"; xattr -l xa/f.txt
          ./pbmac backup --id "$XID" test.pxar:xa
          BT=$(./pbmac list --json | python3 -c "import sys,json;print(max(s['backup-time'] for s in json.load(sys.stdin) if s['backup-id']=='$XID'))")
          ./pbmac restore --target xa-out "host/$XID/$BT" test.pxar
          echo "--- restored xattrs ---"; xattr -l xa-out/f.txt || true
          diff xa/f.txt xa-out/f.txt
          # Compare each xattr value source-vs-restored via hex (robust to the exact
          # `xattr -px` formatting); a missing attr yields empty and fails.
          for name in com.pbmac.test1 com.pbmac.bin; do
            src=$(xattr -px "$name" xa/f.txt | tr -d ' \n')
            rst=$(xattr -px "$name" xa-out/f.txt | tr -d ' \n')
            echo "$name: src=$src rst=$rst"
            test -n "$rst"; test "$src" = "$rst"
          done
          echo "xattr fidelity OK: xattrs restored byte-for-byte"

      - name: macOS file-flags fidelity (chflags)
        run: |
          mkdir -p fl
          printf 'locked\n' > fl/locked.txt
          printf 'hidden\n' > fl/hidden.txt
          chflags uchg fl/locked.txt      # UF_IMMUTABLE (Finder "Locked")
          chflags hidden fl/hidden.txt    # UF_HIDDEN
          echo "--- source flags ---"; ls -lO fl
          ./pbmac backup --id "$FID" test.pxar:fl
          BT=$(./pbmac list --json | python3 -c "import sys,json;print(max(s['backup-time'] for s in json.load(sys.stdin) if s['backup-id']=='$FID'))")
          ./pbmac restore --target fl-out "host/$FID/$BT" test.pxar
          echo "--- restored flags ---"; ls -lO fl-out
          ls -lO fl-out/locked.txt | grep -qw uchg
          ls -lO fl-out/hidden.txt | grep -qw hidden
          diff fl/locked.txt fl-out/locked.txt
          echo "file-flags fidelity OK: uchg + hidden restored"
          # clear immutable so workspace cleanup can remove the files
          chflags nouchg fl/locked.txt fl-out/locked.txt || true

      - name: prune test snapshots
        if: always()
        run: |
          IFS=: read -r H P S <<< "$PBS_REPOSITORY"
          if [ -z "$S" ]; then S="$P"; P=8007; fi
          base="https://$H:$P/api2/json/admin/datastore/$S/snapshots"
          for id in "$BID" "${BID}-enc" "$IID" "$XID" "$FID"; do
            [ -z "$id" ] && continue
            curl -k -sS -H "Authorization: PBSAPIToken=$PBS_API_TOKEN" "$base?backup-type=host&backup-id=$id" \
              | python3 -c "import json,sys; [print(s['backup-time']) for s in json.load(sys.stdin).get('data',[])]" \
              | while read -r t; do
                  curl -k -sS -o /dev/null -w "  del $id/$t http=%{http_code}\n" -X DELETE \
                    -H "Authorization: PBSAPIToken=$PBS_API_TOKEN" \
                    "$base?backup-type=host&backup-id=$id&backup-time=$t"
                done
          done
          echo "pruned test snapshots"

  interop:
    name: interop — official proxmox-backup-client restores our archive
    runs-on: ubuntu-latest
    env:
      PBS_REPOSITORY: ${{ secrets.PBS_REPOSITORY }}
      PBS_API_TOKEN: ${{ secrets.PBS_API_TOKEN }}
      PBS_FINGERPRINT: ${{ secrets.PBS_FINGERPRINT }}
      IID: ci-interop-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: check secrets are set
        run: |
          if [ -z "$PBS_REPOSITORY" ] || [ -z "$PBS_API_TOKEN" ] || [ -z "$PBS_FINGERPRINT" ]; then
            echo "::error::secrets not set"; exit 1
          fi

      - name: install proxmox-backup-client
        run: |
          set -euo pipefail
          sudo wget -q https://enterprise.proxmox.com/debian/proxmox-release-bookworm.gpg \
            -O /etc/apt/trusted.gpg.d/proxmox-release-bookworm.gpg
          echo "deb [arch=amd64] http://download.proxmox.com/debian/pbs-client bookworm main" \
            | sudo tee /etc/apt/sources.list.d/pbs-client.list
          sudo apt-get update
          sudo apt-get install -y proxmox-backup-client
          # Don't run `... version` here: PBS_REPOSITORY is set at job level and
          # that command would try to connect (and fail without PBS_PASSWORD).
          command -v proxmox-backup-client

      - name: build pbmac and back up a tree
        run: |
          go build -trimpath -o pbmac ./cmd/pbmac
          mkdir -p tree/sub
          printf 'interop root file\n' > tree/a.txt
          printf 'nested interop bytes\n' > tree/sub/b.txt
          head -c 5000000 /dev/urandom > tree/blob.bin
          ./pbmac backup --id "$IID" test.pxar:tree

      - name: restore with proxmox-backup-client and diff
        run: |
          set -euo pipefail
          # Our secret is host:port:store + token user@realm!tok:secret; the official
          # client wants user@realm!tok@host:port:store + PBS_PASSWORD=secret.
          IFS=: read -r H P S <<< "$PBS_REPOSITORY"
          if [ -z "$S" ]; then S="$P"; P=8007; fi
          TOKENID="${PBS_API_TOKEN%:*}"; SECRET="${PBS_API_TOKEN##*:}"
          export PBS_REPOSITORY="${TOKENID}@${H}:${P}:${S}"
          export PBS_PASSWORD="$SECRET"
          echo "official-client repository: ${TOKENID}@${H}:${P}:${S}"
          BT=$(proxmox-backup-client snapshot list --output-format json \
               | jq -r --arg id "$IID" '[.[] | select(.["backup-id"]==$id) | .["backup-time"]] | max')
          ISO=$(date -u -d "@$BT" +%Y-%m-%dT%H:%M:%SZ)
          SNAP="host/$IID/$ISO"
          echo "restoring $SNAP"
          mkdir -p restored
          proxmox-backup-client restore "$SNAP" test.pxar ./restored/
          diff -r tree restored
          echo "INTEROP OK: proxmox-backup-client restored our pbmac archive byte-perfect"

      - name: prune
        if: always()
        run: |
          IFS=: read -r H P S <<< "$PBS_REPOSITORY"
          if [ -z "$S" ]; then S="$P"; P=8007; fi
          base="https://$H:$P/api2/json/admin/datastore/$S/snapshots"
          curl -k -sS -H "Authorization: PBSAPIToken=$PBS_API_TOKEN" "$base?backup-type=host&backup-id=$IID" \
            | python3 -c "import json,sys; [print(s['backup-time']) for s in json.load(sys.stdin).get('data',[])]" \
            | while read -r t; do
                curl -k -sS -o /dev/null -w "  del $IID/$t http=%{http_code}\n" -X DELETE \
                  -H "Authorization: PBSAPIToken=$PBS_API_TOKEN" \
                  "$base?backup-type=host&backup-id=$IID&backup-time=$t"
              done
          echo "pruned interop snapshot"
