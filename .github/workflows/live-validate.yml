name: Live PBS validation

# MANUAL ONLY — runs real backup + restore round-trips against a live PBS.
# GitHub-hosted runners are on the public internet, so the server must be
# reachable over the WAN (port 8007). Configure three repo secrets first
# (Settings -> Secrets and variables -> Actions):
#   PBS_REPOSITORY   <wan-host>:8007:<datastore>
#   PBS_API_TOKEN    USER@REALM!TOKENID:SECRET
#   PBS_FINGERPRINT  server cert SHA-256 (AA:BB:.. or bare hex)
# The token only needs DatastoreAdmin on the target datastore. Test snapshots
# are pruned at the end (even on failure).
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live:
    name: live backup/restore round-trip (macOS arm64)
    runs-on: macos-14
    env:
      PBS_REPOSITORY: ${{ secrets.PBS_REPOSITORY }}
      PBS_API_TOKEN: ${{ secrets.PBS_API_TOKEN }}
      PBS_FINGERPRINT: ${{ secrets.PBS_FINGERPRINT }}
      BID: ci-${{ github.run_id }}
      IID: ci-inc-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: check secrets are set
        run: |
          if [ -z "$PBS_REPOSITORY" ] || [ -z "$PBS_API_TOKEN" ] || [ -z "$PBS_FINGERPRINT" ]; then
            echo "::error::Set PBS_REPOSITORY, PBS_API_TOKEN and PBS_FINGERPRINT repo secrets first."
            exit 1
          fi

      - name: build pbmac
        run: go build -trimpath -o pbmac ./cmd/pbmac

      - name: ping + list (auth + TLS pin)
        run: |
          ./pbmac ping
          ./pbmac list

      - name: prepare test tree
        run: |
          mkdir -p data/sub
          printf 'hello from CI run %s\n' "$BID" > data/a.txt
          printf 'nested bytes\n' > data/sub/b.txt
          head -c 40000 /dev/urandom > data/blob.bin

      - name: plain backup -> restore -> verify
        run: |
          ./pbmac backup --id "$BID" test.pxar:data
          BT=$(./pbmac list --json | python3 -c "import sys,json;print([s['backup-time'] for s in json.load(sys.stdin) if s['backup-id']=='$BID'][-1])")
          echo "BT_PLAIN=$BT" >> "$GITHUB_ENV"
          ./pbmac restore --target out "host/$BID/$BT" test.pxar
          diff -r data out
          echo "plain round-trip byte-perfect"

      - name: single-file restore
        run: |
          rm -rf single && mkdir single
          ./pbmac restore --file /a.txt --target single "host/$BID/$BT_PLAIN" test.pxar
          test "$(cat single/a.txt)" = "hello from CI run $BID"
          test "$(find single -type f | wc -l | tr -d ' ')" = "1"
          echo "single-file restore OK (only /a.txt, correct content)"

      - name: encrypted backup -> restore -> verify (+ no-key negative)
        run: |
          openssl rand -hex 32 > enc.key
          ./pbmac backup --id "${BID}-enc" --keyfile enc.key test.pxar:data
          BT=$(./pbmac list --json | python3 -c "import sys,json;print([s['backup-time'] for s in json.load(sys.stdin) if s['backup-id']=='${BID}-enc'][-1])")
          echo "BT_ENC=$BT" >> "$GITHUB_ENV"
          ./pbmac restore --keyfile enc.key --target out-enc "host/${BID}-enc/$BT" test.pxar
          diff -r data out-enc
          echo "encrypted round-trip byte-perfect"
          if ./pbmac restore --target out-nokey "host/${BID}-enc/$BT" test.pxar 2>/dev/null; then
            echo "::error::no-key restore unexpectedly succeeded"; exit 1
          fi
          echo "no-key restore correctly refused"

      - name: incremental dedup (previous-snapshot reuse)
        run: |
          mkdir -p inc/docs
          head -c 20000000 /dev/urandom > inc/big.bin
          printf 'v1\n' > inc/docs/notes.txt
          ./pbmac backup --id "$IID" test.pxar:inc >/dev/null
          sleep 2 # PBS snapshots are second-granularity; ensure a newer timestamp
          # Re-back-up unchanged: expect 0 uploads, all chunks reused.
          ./pbmac backup --id "$IID" --json test.pxar:inc > inc2.json
          cat inc2.json
          python3 - <<'PY'
          import json
          r = json.load(open('inc2.json'))
          assert r['unique_chunks'] == 0, f"expected 0 uploads on unchanged re-backup, got {r['unique_chunks']}"
          assert r['reused_chunks'] > 0, "expected chunk reuse from the previous snapshot"
          print(f"incremental reuse OK: uploaded 0, reused {r['reused_chunks']} chunks")
          PY
          # The reused snapshot must still restore byte-perfect.
          BT=$(./pbmac list --json | python3 -c "import sys,json;print(max(s['backup-time'] for s in json.load(sys.stdin) if s['backup-id']=='$IID'))")
          ./pbmac restore --target inc-out "host/$IID/$BT" test.pxar
          diff -r inc inc-out
          echo "incremental snapshot restores byte-perfect"

      - name: prune test snapshots
        if: always()
        run: |
          IFS=: read -r H P S <<< "$PBS_REPOSITORY"
          if [ -z "$S" ]; then S="$P"; P=8007; fi
          base="https://$H:$P/api2/json/admin/datastore/$S/snapshots"
          for id in "$BID" "${BID}-enc" "$IID"; do
            [ -z "$id" ] && continue
            curl -k -sS -H "Authorization: PBSAPIToken=$PBS_API_TOKEN" \
              "$base?backup-type=host&backup-id=$id" \
              | python3 -c "import json,sys; [print(s['backup-time']) for s in json.load(sys.stdin).get('data',[])]" \
              | while read -r t; do
                  curl -k -sS -o /dev/null -w "  del $id/$t http=%{http_code}\n" -X DELETE \
                    -H "Authorization: PBSAPIToken=$PBS_API_TOKEN" \
                    "$base?backup-type=host&backup-id=$id&backup-time=$t"
                done
          done
          echo "pruned test snapshots"
